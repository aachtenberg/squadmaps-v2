<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SquadMaps v10</title>
  <meta name="description" content="Interactive Squad v10 map viewer with all layers, factions, vehicles, objectives, and mortar calculator.">
  <link rel="icon" href="squadmaps-32.png" type="image/png" sizes="32x32">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=44">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <h1><a href="#" id="home-link">SQUADMAPS</a></h1>
      <span class="version-badge" id="version-badge">SQ v10.0</span>
    </div>
    <div class="header-center">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search maps or layers..." autocomplete="off">
      </div>
    </div>
    <div class="header-right">
      <select id="lang-select">
        <option value="en">EN</option>
        <option value="de">DE</option>
        <option value="fr">FR</option>
        <option value="zh">中文</option>
        <option value="ua">UA</option>
      </select>
    </div>
  </header>

  <!-- Main Layout -->
  <div id="app">
    <!-- Map Grid (card list) -->
    <div id="map-grid" class="map-grid"></div>

    <!-- Map View (single map with Leaflet) -->
    <div id="map-view" class="map-view hidden">
      <div class="map-view-header">
        <button id="back-btn" class="back-btn">&larr; Back</button>
        <div class="layer-info">
          <h2 id="layer-name"></h2>
          <div class="layer-meta" id="layer-meta"></div>
        </div>
      </div>

      <div class="map-view-body">
        <!-- Left sidebar: tabbed (Layers / Info) -->
        <aside id="left-sidebar" class="sidebar left-sidebar">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="layers">Layers</button>
            <button class="sidebar-tab" data-tab="info">Info</button>
          </div>
          <div class="sidebar-tab-pane active" id="tab-layers">
            <div id="layer-list" class="layer-list"></div>
          </div>
          <div class="sidebar-tab-pane" id="tab-info">
            <div id="detail-content"></div>
          </div>
        </aside>

        <!-- Map container -->
        <div id="map-container" class="map-container">
          <div id="leaflet-map" class="leaflet-map"></div>
          <!-- Top info bar -->
          <div id="top-panel" class="top-panel">
            <div class="team-panel team1-panel" id="team1-panel"></div>
            <div class="match-info" id="match-info"></div>
            <div class="team-panel team2-panel" id="team2-panel"></div>
          </div>
          <!-- Right-click context menu (GIS-style tool picker) -->
          <div id="map-context-menu" class="map-context-menu hidden" role="menu">
            <button class="mcm-item" data-action="hab" role="menuitem">
              <span class="mcm-icon mcm-icon-hab">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                  <path d="M5 16L3 7l5.5 4L12 5l3.5 6L21 7l-2 9H5zm0 2h14v2H5v-2z"/>
                </svg>
              </span>Place HAB
            </button>
            <button class="mcm-item" data-action="mortar-place" role="menuitem">
              <span class="mcm-icon">&#9876;</span>Place Mortar
            </button>
            <button class="mcm-item" data-action="mortar-target" role="menuitem">
              <span class="mcm-icon">&#8853;</span>Add Target
            </button>
            <div class="mcm-divider"></div>
            <button class="mcm-item mcm-item-danger" data-action="clear-habs" role="menuitem">
              <span class="mcm-icon">&times;</span>Clear HABs
            </button>
            <button class="mcm-item mcm-item-danger" data-action="clear-mortar" role="menuitem">
              <span class="mcm-icon">&times;</span>Clear Mortar
            </button>
          </div>

          <!-- Mortar firing solution — double-click the map to place -->
          <div id="mortar-panel" class="mortar-panel hidden">
            <div class="mortar-panel-header">
              <span>Standard Mortar</span>
              <button id="mortar-close-btn" class="mortar-close-btn" title="Clear (Esc)">&times;</button>
            </div>
            <div id="mortar-result" class="mortar-result"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/v10_data.js?v=2"></script>
  <script src="data/translations.js"></script>
  <script src="data/water_hazards.js"></script>
  <script src="app.js?v=43"></script>
</body>
</html>
